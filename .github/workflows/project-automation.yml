name: Project Automation

on:
  issues:
    types: [opened, closed, reopened, labeled, assigned]
  pull_request:
    types: [opened, closed, reopened, ready_for_review, synchronize, labeled, assigned]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  add-to-project:
    name: Add to Project
    runs-on: ubuntu-latest
    
    steps:
      - name: Add issue/PR to project using GraphQL
        uses: actions/github-script@v7
        with:
          script: |
            const projectId = 'PVT_kwDODu3omc4BLDgl';
            const itemId = context.payload.issue?.node_id || context.payload.pull_request?.node_id;
            
            if (!itemId) {
              console.log('No issue or PR found in payload');
              return;
            }
            
            // Add item to project
            const mutation = `
              mutation($projectId: ID!, $itemId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $itemId}) {
                  item {
                    id
                  }
                }
              }
            `;
            
            try {
              const result = await github.graphql(mutation, {
                projectId: projectId,
                itemId: itemId
              });
              
              console.log(`Successfully added item to project: ${result.addProjectV2ItemById.item.id}`);
            } catch (error) {
              // Item might already be in project
              if (error.message && (error.message.includes('already exists') || error.message.includes('already added'))) {
                console.log('Item is already in the project');
              } else {
                console.error('Error adding item to project:', error.message);
                // Don't throw - allow workflow to continue even if project add fails
              }
            }
