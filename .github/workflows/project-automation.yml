name: Project Automation

on:
  issues:
    types: [opened, closed, reopened, labeled, assigned]
  pull_request:
    types: [opened, closed, reopened, ready_for_review, synchronize, labeled, assigned]

permissions:
  issues: write
  pull-requests: write
  contents: read
  projects: write

jobs:
  add-to-project:
    name: Add to Project
    runs-on: ubuntu-latest
    
    steps:
      - name: Add issue/PR to project
        uses: actions/add-to-project@v1.0.1
        with:
          project-url: https://github.com/orgs/keyraft/projects/1
          github-token: ${{ secrets.GITHUB_TOKEN }}
