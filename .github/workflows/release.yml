name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Get version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Build binaries
      run: |
        # Linux AMD64
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
          -ldflags="-s -w -X main.Version=${{ steps.get_version.outputs.VERSION }}" \
          -o keyrafted-linux-amd64 .
        
        # Linux ARM64
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
          -ldflags="-s -w -X main.Version=${{ steps.get_version.outputs.VERSION }}" \
          -o keyrafted-linux-arm64 .
        
        # macOS AMD64
        CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
          -ldflags="-s -w -X main.Version=${{ steps.get_version.outputs.VERSION }}" \
          -o keyrafted-darwin-amd64 .
        
        # macOS ARM64 (Apple Silicon)
        CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
          -ldflags="-s -w -X main.Version=${{ steps.get_version.outputs.VERSION }}" \
          -o keyrafted-darwin-arm64 .
        
        # Windows AMD64
        CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
          -ldflags="-s -w -X main.Version=${{ steps.get_version.outputs.VERSION }}" \
          -o keyrafted-windows-amd64.exe .

    - name: Generate checksums
      run: |
        sha256sum keyrafted-* > checksums.txt
        cat checksums.txt

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          keyrafted-linux-amd64
          keyrafted-linux-arm64
          keyrafted-darwin-amd64
          keyrafted-darwin-arm64
          keyrafted-windows-amd64.exe
          checksums.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Get version
      id: get_version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "VERSION_SHORT=${VERSION#v}" >> $GITHUB_OUTPUT

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          keyraft/keyrafted:latest
          keyraft/keyrafted:${{ steps.get_version.outputs.VERSION_SHORT }}
          keyraft/keyrafted:${{ steps.get_version.outputs.VERSION }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

