name: Auto Assign

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  pull-requests: write
  issues: write

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-assign PR author
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const prAuthor = context.payload.pull_request.user.login;
            const prNumber = context.payload.pull_request.number;
            
            try {
              // Use issues API (PRs are a type of issue in GitHub's API)
              // This is the correct endpoint for assigning PRs
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                assignees: [prAuthor]
              });
              console.log(`Assigned PR #${prNumber} to ${prAuthor}`);
            } catch (error) {
              console.log(`⚠️  Could not assign PR: ${error.message}`);
              console.log('This may happen if the user is not a collaborator or token lacks permissions');
              console.log('Workflow will continue - assignment is not critical');
            }

