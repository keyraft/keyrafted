name: Dependabot Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v1
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      
      - name: Auto-assign Dependabot PRs
        uses: actions/github-script@v7
        with:
          script: |
            const maintainers = ['xentixar'];
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              assignees: maintainers
            });
            console.log(`Assigned Dependabot PR #${context.payload.pull_request.number} to maintainers`);
      
      - name: Enable auto-merge for Dependabot PRs
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const updateType = '${{ steps.metadata.outputs.update-type }}';
            
            console.log(`Auto-merging Dependabot PR #${prNumber} (${updateType})`);
            
            // Enable auto-merge with squash
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'squash',
              commit_title: `chore(deps): ${{ github.event.pull_request.title }}`,
              commit_message: `Auto-merge: ${{ github.event.pull_request.title }}`
            });
            
            console.log(`Successfully merged PR #${prNumber}`);

